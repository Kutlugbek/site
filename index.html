<!DOCTYPE html>
<html>
<head>
	<title>Калькулятор | KseniaSmit</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css" integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">
</head>
<body class="bg-dark">
	<div class="container-fluid text-center">
		<h1 class="text-light mb-5">Калькулятор</h1>
		<div class="input-group mb-3">
			<span class="input-group-text">Скорлупа ППУ</span>
			<select class="form-select">
				<option selected>Площадь</option>
				<option value="1">32</option>
				<option value="2">38</option>
				<option value="3">48</option>
			</select>
			<select class="form-select">
				<option selected>Величина</option>
				<option value="1">20</option>
				<option value="1">30</option>
				<option value="1">40</option>
				<option value="1">50</option>
			</select>
			<select class="form-select">
				<option selected>Плотность</option>
				<option value="1">20</option>
				<option value="1">30</option>
				<option value="1">40</option>
				<option value="1">50</option>
			</select>
			<input type="text" class="form-control" placeholder="Длина">
			<input type="text" class="form-control bg-light" placeholder="Масса">
			<input type="text" class="form-control bg-light" placeholder="Объём">
		</div>
		<div class="row">
			<div class="text-left col-6">
				<button type="button" class="btn btn-outline-info disabled">Добавить</button>
			</div>
			<div class="text-right col-6 row">
				<h3 class="text-light col-6">Масса: 0</h3>
				<h3 class="text-light col-6">Объём: 0</h3>
			</div>
		</div>
	</div>
</body>
</html>
